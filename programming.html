<!DOCTYPE html>
<html>
<head>
    <title>Programming in Python</title>

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="assets/css/programming.css">
</head>

<body>

<div class="container">

    <!-- Header section -->
    <div class="header">
        <h1>Programming in Python</h1>
        <a href="index.html" class="back">Back</a>
    </div>

    <h2>Fill in the Blanks</h2>

    <!-- Question display area -->
    <div class="questionBox" id="question"></div>

    <!-- User input field -->
    <input type="text" id="answer" placeholder="Type your answer here">

    <br>

    <!-- Buttons -->
    <button id="submitBtn" onclick="checkAnswer()">Submit</button>
    <button id="hintBtn" class="hintBtn" onclick="showHint()">Show Hint</button>
    <button id="skipBtn" onclick="skipQuestion()">Skip</button>
    <button class="showAnswersBtn" onclick="toggleAnswers()">Show Answers</button>

    <!-- Try again button -->
    <button id="retryBtn" class="retryBtn" onclick="restartQuiz()">Try Again</button>

    <!-- Hint and feedback -->
    <p id="hint"></p>
    <p id="feedback"></p>

    <!-- Console output -->
    <div class="console" id="console"></div>

    <!-- Answers display -->
    <div id="answersBox"></div>

</div>

<!-- Link to external JavaScript -->
<script src="assets/js/programming.js"></script>

</body>
</html>
