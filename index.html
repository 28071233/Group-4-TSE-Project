<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Computer Science!</title>

    <style>
        body {
            background-color: #161b22;
        }

        h1 {
            color: cornsilk;
            text-align: center;
            margin-left: 32%;
        }

        /*Sidebar placement and style */
        aside {
            height: 100%;
            width: 32%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #111;
            padding-top: 20px;
        }

        /*Sidebar options style*/
        aside a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 25px;
            color: #818181;
            display: block;
        }

        /*Main page content placement*/
        div {
            margin-left: 32%; /*margin left must be the same as the width of aside*/
            padding: 0px 10px;
            color: azure;
        }
    </style>

    <script>
        function welcomeText() {
            document.getElementById("pageText").innerHTML = "Welcome to Computer Science! hover over the buttons on the sidebar to update this text";
        }

        function algorithmsText() {
            document.getElementById("pageText").innerHTML = "Algorithms";
        }

        function architectureText() {
            document.getElementById("pageText").innerHTML = "Architecture";
        }

         function cyberSecurityText() {
            document.getElementById("pageText").innerHTML = "Cyber Security";
        }
    </script>
</head>

<body>
    <h1>Welcome to Computer Science!</h1>
    <!-- Sidebar -->
    <aside>
        <a onmouseover=welcomeText() href="index.html">Welcome!</a>
        <a onmouseover=algorithmsText() href="algorithms.html">Algorithms</a>
        <a onmouseover=architectureText() href="architecture.html">Architecture</a>
        <a onmouseover=cyberSecurityText() href="security.html">Cyber Security</a>
    </aside>
    <!-- Page Content -->
    <div>
        <p id="pageText">Welcome to Computer Science! hover over the buttons on the sidebar to update this text</p>
    </div>
</body>
</html>
