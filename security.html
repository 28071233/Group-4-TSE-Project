<!DOCTYPE html>
<html>
<head>
    <title>Phishing Awareness Game</title>

    <style>
        /* Basic page styling */
        body { font-family: Arial; text-align: center; background: #f4f4f4; }

        /* Main content box */
        .container { width: 60%; margin: auto; background: white; padding: 20px; border-radius: 10px; }

        /* Header with title + back button */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Back button styling */
        .back {
            text-decoration: none;
            color: #3498db;
            font-size: 14px;
        }

        /* Email / link display box */
        .email {
            text-align: left;
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 20px;
        }

        /* Button styling */
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Different colours for answers */
        .phish { background: #e74c3c; color: white; }
        .safe { background: #2ecc71; color: white; }
    </style>
</head>

<body>

<div class="container">

    <!-- Header section -->
    <div class="header">
        <h1>Cyber Security</h1>
        <a href="index.html" class="back">Back</a>
    </div>

    <!-- ================= MAIN MENU ================= -->
    <div id="menu">
        <h2>Select a Game</h2>
        <button onclick="startPhishing()">Phishing Game</button>
        <button onclick="startLinks()">Suspicious Links Game</button>
    </div>

    <!-- ================= PHISHING GAME ================= -->
    <div id="game" style="display:none;">

        <h2>Spot the Phishing Email</h2>

        <div class="email">
            <p><strong>From:</strong> <span id="from"></span></p>
            <p><strong>Subject:</strong> <span id="subject"></span></p>
            <p id="body"></p>
        </div>

        <button class="phish" onclick="answer('phishing')">Phishing</button>
        <button class="safe" onclick="answer('safe')">Safe</button>

        <p id="feedback"></p>
        <p id="explanation"></p>
    </div>

    <!-- ================= LINK GAME ================= -->
    <div id="linkGame" style="display:none;">

        <h2>Is This Link Safe?</h2>

        <div class="email">
            <p id="linkText"></p>
        </div>

        <button class="safe" onclick="answerLink('safe')">Safe</button>
        <button class="phish" onclick="answerLink('phishing')">Suspicious</button>

        <p id="linkFeedback"></p>
        <p id="linkExplanation"></p>
    </div>

    <!-- ================= END SCREEN ================= -->
    <div id="end" style="display:none;">
        <h2>Quiz Complete</h2>
        <p>Your Score: <span id="finalScore"></span></p>
        <button onclick="restart()">Back to Menu</button>
    </div>

</div>

<script>

/* ================= MENU FUNCTIONS ================= */

/* Start phishing game */
function startPhishing() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    loadEmail();
}

/* Start link game */
function startLinks() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("linkGame").style.display = "block";
    loadLink();
}

/* ================= PHISHING GAME ================= */

/* List of emails for the quiz */
const emails = [
{
from: "security@paypa1.com",
subject: "URGENT: Account Suspended",
body: "Your account has been suspended. Click here to verify immediately.",
answer: "phishing",
explanation: "Fake domain (paypa1), urgency, and suspicious link."
},
{
from: "noreply@university.ac.uk",
subject: "Course Reminder",
body: "Reminder: Your lecture starts at 10AM tomorrow.",
answer: "safe",
explanation: "Legitimate domain and no suspicious links."
}
];

/* Track current question and score */
let index = 0;
let score = 0;

/* Load an email onto the page */
function loadEmail() {

    if (index >= emails.length) {
        endGame(score, emails.length);
        return;
    }

    let e = emails[index];

    document.getElementById("from").innerText = e.from;
    document.getElementById("subject").innerText = e.subject;
    document.getElementById("body").innerText = e.body;

    document.getElementById("feedback").innerText = "";
    document.getElementById("explanation").innerText = "";
}

/* Check user answer */
function answer(choice) {

    let correct = emails[index];

    if (choice === correct.answer) {
        score++;
        document.getElementById("feedback").innerText = "Correct";
    } else {
        document.getElementById("feedback").innerText = "Incorrect";
    }

    document.getElementById("explanation").innerText = correct.explanation;

    index++;

    setTimeout(loadEmail, 2000);
}

/* ================= LINK GAME ================= */

/* List of links for the quiz */
const links = [
{
url: "https://paypal.com",
answer: "safe",
explanation: "Correct domain name."
},
{
url: "https://paypa1-login-secure.ru",
answer: "phishing",
explanation: "Misspelling and suspicious domain."
},
{
url: "http://secure-amazon-login.net",
answer: "phishing",
explanation: "Fake domain and no HTTPS."
},
{
url: "https://google.com",
answer: "safe",
explanation: "Trusted domain."
}
];

/* Track link game progress */
let linkIndex = 0;
let linkScore = 0;

/* Load a link onto the page */
function loadLink() {

    if (linkIndex >= links.length) {
        endGame(linkScore, links.length);
        return;
    }

    let l = links[linkIndex];

    document.getElementById("linkText").innerText = l.url;

    document.getElementById("linkFeedback").innerText = "";
    document.getElementById("linkExplanation").innerText = "";
}

/* Check user answer for link game */
function answerLink(choice) {

    let correct = links[linkIndex];

    if (choice === correct.answer) {
        linkScore++;
        document.getElementById("linkFeedback").innerText = "Correct";
    } else {
        document.getElementById("linkFeedback").innerText = "Incorrect";
    }

    document.getElementById("linkExplanation").innerText = correct.explanation;

    linkIndex++;

    setTimeout(loadLink, 2000);
}

/* ================= END / RESET ================= */

/* Show final score */
function endGame(finalScoreValue, total) {

    document.getElementById("game").style.display = "none";
    document.getElementById("linkGame").style.display = "none";
    document.getElementById("end").style.display = "block";

    document.getElementById("finalScore").innerText = finalScoreValue + "/" + total;
}

/* Restart back to menu */
function restart() {
    index = 0;
    score = 0;
    linkIndex = 0;
    linkScore = 0;

    document.getElementById("menu").style.display = "block";
    document.getElementById("end").style.display = "none";
}

</script>

</body>
</html>
